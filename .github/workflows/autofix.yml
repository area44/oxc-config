name: Autofix

on:
  pull_request:

jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: autofix build artifacts"
